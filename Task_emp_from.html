<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Contact Page</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

    <!-- Header -->
    <nav class="navbar navbar-dark bg-primary">
        <div class="container-fluid">
            <span class="navbar-brand mb-0 h1">Employee Details</span>
        </div>
    </nav>

    <!-- Contact Form -->
    <div class="container mt-4">
        <div class="card p-4 shadow-sm">
            <form>
                <div class="row mb-3">
                    <div class="col-md-3">
                        <label>Name</label>
                        <input type="text" class="form-control" placeholder="Enter Your name...">
                    </div>

                    <div class="col-md-3">
                        <label>Email</label>
                        <input type="email" class="form-control" placeholder="Enter Your email...">
                    </div>

                    <div class="col-md-3">
                        <label>Phone</label>
                        <input type="text" class="form-control" placeholder="Enter Your phone...">
                    </div>

                    <div class="col-md-3">
                        <label>Telephone</label>
                        <input type="text" class="form-control" placeholder="Enter Your telephone...">
                    </div>
                </div>

                <div class="row mb-3">
                    <div class="col-md-3">
                        <label>DOB</label>
                        <input type="date" class="form-control">
                    </div>

                    <div class="col-md-3">
                        <label>Address</label>
                        <input type="text" class="form-control" placeholder="Enter address here...">
                    </div>

                    <div class="col-md-3">
                        <label>PAN</label>
                        <input type="text" class="form-control" placeholder="Enter Your PAN...">
                    </div>

                    <div class="col-md-3">
                        <label>Upload Docs</label>
                        <input type="file" class="form-control">
                    </div>
                </div>

                <div class="row mb-3">
                    <div class="col-md-3">
                        <label>Blood Group</label>
                        <select class="form-select">
                            <option>-- Select Blood Group --</option>
                            <option>A+</option>
                            <option>B+</option>
                            <option>O+</option>
                        </select>
                    </div>

                    <div class="col-md-3">
                        <label>Gender</label><br>
                        <input type="radio" name="gender"> Male
                        <input type="radio" name="gender" class="ms-2"> Female
                    </div>

                    <div class="col-md-6">
                        <label>Salary: 50000</label>
                        <input type="range" class="form-range">
                    </div>
                </div>

                <div class="mb-3">
                    <label>Message</label>
                    <textarea class="form-control" rows="3" placeholder="Message here..."></textarea>
                </div>

                <div class="text-end">
                    <button class="btn btn-primary">Submit</button>
                </div>

            </form>
        </div>
    </div>

    <!-- Footer (Primary Color) -->
    <footer class="bg-primary text-white mt-5 pt-4 pb-3">
        <div class="container">
            <div class="row">

                <div class="col-md-4">
                    <h5>Tata Tech</h5>
                    <p>Building modern and scalable tech solutions.</p>
                </div>

                <div class="col-md-4">
                    <h5>Quick Links</h5>
                    <p>Home<br>About<br>Services<br>Contact</p>
                </div>

                <div class="col-md-4">
                    <h5>Contact</h5>
                    <p>
                        Pune, India <br>
                        info@Tatatech.com <br>
                        +91 85648 45624
                    </p>
                </div>

            </div>

            <hr class="bg-white">
            <p class="text-center mb-0">© 2026 Tata Tech</p>
        </div>
    </footer>

</body>

</html>
